<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="icon" type="image/png" href="Images/Favicon.png">
</head>

<body>
    <main id="container">
        <div class="half" id="home">
            <h3>Home</h3>
            <div class="scoreboard" id="scoreboard-home">
                <h2 class="score" id="score-home">0</h2>
            </div>
            <div class="buttons">
                <button class="plusone-btn" id="home-score-btn-1">+1</button>
                <button class="plustwo-btn" id="home-score-btn-2">+2</button>
                <button class="plusthree-btn" id="home-score-btn-3">+3</button>
                <button class="reset-btn" id="reset-home">Reset</button>
            </div>
        </div>

        <div class="half" id="guest">
            <h3>Guest</h3>
            <div class="scoreboard" id="scoreboard-guest">
                <h2 class="score" id="score-guest">0</h2>
            </div>
            <div class="buttons">
                <button class="plusone-btn" id="guest-score-btn-1">+1</button>
                <button class="plustwo-btn" id="guest-score-btn-2">+2</button>
                <button class="plusthree-btn" id="guest-score-btn-3">+3</button>
                <button class="reset-btn" id="reset-guest">Reset</button>
            </div>
        </div>

    </main>
    
    <script type="text/javascript" src="script.js"></script>



</body>




</html>
